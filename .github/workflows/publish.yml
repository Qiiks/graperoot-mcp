name: Publish to npm

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump version and publish
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Extract version parts
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          # Check if this version already exists on npm
          if npm view graperoot-mcp@$NEW_VERSION version &>/dev/null; then
            echo "Version $NEW_VERSION already published on npm. Skipping publish."
            exit 0
          fi

          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version

          # Publish to npm
          npm publish

          # Commit the version bump so subsequent runs see the updated version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json 2>/dev/null || true
          git commit -m "chore(master): bump version to $NEW_VERSION"
          git push origin master
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}